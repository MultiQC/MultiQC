name: New module
description: Request support for a new bioinformatics tool in MultiQC
labels: ["module: new"]
body:
  - type: markdown
    attributes:
      value: |
        ## 📋 Module Request Guidelines

        Thank you for requesting a new MultiQC module! To help us prioritize and evaluate your request:

        1. **Fill all required fields completely** - incomplete requests may be closed
        2. **Upload actual example files** - these are essential for module development
        3. **Check if a similar module already exists** in the [modules list](https://multiqc.info/modules/)
        4. **Consider tool popularity and community need** - this affects prioritization

        ✨ **Pro tip**: After submitting, comment `@claude analyze-module` for instant automated feedback and priority assessment!
  - type: input
    id: name
    attributes:
      label: Name of the tool
      placeholder: eg. My Tool
    validations:
      required: true

  - type: input
    id: homepage
    attributes:
      label: Tool homepage / repository
      description: "Provide the main homepage or GitHub/GitLab repository URL. This helps us assess tool popularity and maintenance status."
      placeholder: eg. https://github.com/user/mytool or https://mytool.readthedocs.io
    validations:
      required: true

  - type: input
    id: description
    attributes:
      label: Tool description
      description: A short single-sentence description that will be used in the modules listing on the MultiQC homepage.
      placeholder: eg. My Tool is a really excellent tool that does what no other tool can do
    validations:
      required: true

  - type: textarea
    id: example-files
    attributes:
      label: Tool output example files
      description: |
        **📁 REQUIRED: Upload actual example files** - This is the most critical part of your request!
        
        - Drag and drop example files that show typical tool output
        - **Do NOT copy/paste file contents** - formatting and whitespace matter
        - Use `.zip` files if GitHub doesn't support the file type
        - Include both small and representative examples
        - Truncate large files but keep enough data to show the format
        
        💡 **Quality examples = Higher priority!** Complete, clear examples help us evaluate feasibility and prioritize your request.
      placeholder: "[ Drag and drop example files here to upload - this field is required ]"
    validations:
      required: true

  - type: input
    id: filename-pattern
    attributes:
      label: Log filename pattern
      description: |
        Specify the filename pattern only if standardised by the tool and **NOT** specified by user. It must be consistent for all runs of tool by any user.
        Leave blank if the tool does not have a standard file naming pattern (eg. printing to standard out, or taking free text filename as a command line option).
      placeholder: eg. *_mytool.txt

  - type: textarea
    id: plots
    attributes:
      label: Data suitable for MultiQC plot(s)
      description: |
        What data in the tool output is most important - what would you like to see in a plot or dedicated table?
        Remember that MultiQC should just highlight the important bits - enough to spot outlier samples for further examination.

  - type: textarea
    id: general-stats
    attributes:
      label: Most interesting data for the General Stats table
      description: Is there 1-3 values that would be helpful to have in the _General Statistics_ table, alongside results from other tools?

  - type: textarea
    id: context
    attributes:
      label: Additional context and justification
      description: |
        Help us understand why this module would be valuable to the MultiQC community:
        - How widely is this tool used in your field?
        - Are there existing alternatives or similar tools already supported?
        - What unique value would this module provide?
        - Is this request related to a published workflow or pipeline?
      placeholder: "This tool is widely used in the genomics community for... It would complement existing modules by..."

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      description: >-
        Please ensure your module request fulfills all of the following requirements.
      options:
        - label: >-
            I have included example data files (uploaded/zipped, not copy-pasted) that can be used to write the module.
          required: true
        - label: >-
            I have checked that no similar module already exists in the MultiQC modules list.
          required: true
        - label: >-
            I have provided the tool's homepage or repository URL for popularity assessment.
          required: true
        - label: >-
            I understand this request will be prioritized based on tool popularity, community need, and request quality.
          required: true

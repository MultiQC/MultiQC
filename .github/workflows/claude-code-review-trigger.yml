name: Claude Code Review Trigger

on:
  issue_comment:
    types: [created]

jobs:
  trigger:
    runs-on: ubuntu-latest
    # Only run on PR comments containing /review or /preview
    if: |
      github.event.issue.pull_request &&
      (contains(github.event.comment.body, '/review') || contains(github.event.comment.body, '/preview'))

    steps:
      - name: Save PR info
        run: |
          mkdir -p pr-info

          # Save PR number and head SHA
          echo "${{ github.event.issue.number }}" > pr-info/pr-number.txt
          HEAD_SHA=$(gh pr view "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --json headRefOid -q .headRefOid)
          echo "$HEAD_SHA" > pr-info/head-sha.txt

          # Save which commands were requested (supports both in one comment)
          if echo "$COMMENT_BODY" | grep -q '/review'; then
            touch pr-info/run-review
          fi
          if echo "$COMMENT_BODY" | grep -q '/preview'; then
            touch pr-info/run-preview
          fi

          echo "PR: ${{ github.event.issue.number }} | SHA: $HEAD_SHA"
          ls -la pr-info/
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_BODY: ${{ github.event.comment.body }}

      - name: Upload PR info
        uses: actions/upload-artifact@v4
        with:
          name: pr-info
          path: pr-info/
          retention-days: 1

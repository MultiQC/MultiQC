name: "PR Report Preview"

on:
  workflow_run:
    workflows: ["Claude Code Review Trigger"]
    types:
      - completed

jobs:
  build-and-deploy:
    name: "Build & Deploy Report Preview"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Only run if the trigger workflow succeeded
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      pull-requests: write

    steps:
      - name: Download PR info
        uses: actions/download-artifact@v4
        with:
          name: pr-info
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Check if preview was requested
        id: pr-info
        run: |
          if [ ! -f run-preview ]; then
            echo "Not a /preview request, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_NUMBER=$(cat pr-number.txt)
          HEAD_SHA=$(cat head-sha.txt)

          # Validate PR number is a positive integer
          if ! echo "$PR_NUMBER" | grep -qE '^[0-9]+$'; then
            echo "::error::Invalid PR number: $PR_NUMBER"
            exit 1
          fi

          # Validate HEAD_SHA is a hex string
          if ! echo "$HEAD_SHA" | grep -qE '^[0-9a-f]{40}$'; then
            echo "::error::Invalid HEAD SHA: $HEAD_SHA"
            exit 1
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "PR Number: $PR_NUMBER"
          echo "Head SHA: $HEAD_SHA"

      - name: Checkout PR
        if: steps.pr-info.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-info.outputs.head_sha }}
          fetch-depth: 0

      - name: "Detect modified modules"
        if: steps.pr-info.outputs.skip != 'true'
        id: detect
        run: |
          # Get base branch from the PR
          BASE_REF=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json baseRefName -q .baseRefName)
          echo "Base branch: $BASE_REF"

          # Fetch the base branch for diff
          git fetch origin "$BASE_REF"

          # Get the list of changed files compared to the base branch
          changed_files=$(git diff --name-only "origin/$BASE_REF"...HEAD)

          # Extract unique module names from changed paths
          modules=$(echo "$changed_files" \
            | grep '^multiqc/modules/' \
            | cut -d'/' -f3 \
            | sort -u \
            | tr '\n' ' ')

          if [ -z "$modules" ]; then
            echo "No module changes detected"
            echo "has_modules=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Validate module names contain only safe characters (alphanumeric, hyphens, underscores)
          for mod in $modules; do
            if ! echo "$mod" | grep -qE '^[a-zA-Z0-9_-]+$'; then
              echo "::error::Invalid module name: $mod"
              exit 1
            fi
          done

          echo "Detected modified modules: $modules"
          echo "has_modules=true" >> "$GITHUB_OUTPUT"

          # Build --module flags for multiqc CLI
          module_flags=""
          for mod in $modules; do
            module_flags="$module_flags --module $mod"
          done
          echo "module_flags=$module_flags" >> "$GITHUB_OUTPUT"
          echo "module_list=$modules" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr-info.outputs.pr_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: "Post comment if no modules changed"
        if: steps.pr-info.outputs.skip != 'true' && steps.detect.outputs.has_modules != 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ steps.pr-info.outputs.pr_number }}
          header: multiqc-report-preview
          message: |
            ## MultiQC Report Preview

            No module changes detected in this PR — nothing to preview.

      - name: "Set up Python"
        if: steps.detect.outputs.has_modules == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Install MultiQC"
        if: steps.detect.outputs.has_modules == 'true'
        run: pip install .

      - name: "Download test data"
        if: steps.detect.outputs.has_modules == 'true'
        uses: actions/checkout@v4
        with:
          repository: MultiQC/test-data
          path: test-data

      - name: "Run MultiQC for modified modules"
        if: steps.detect.outputs.has_modules == 'true'
        run: |
          multiqc \
            --force \
            --verbose \
            --outdir multiqc_report \
            --title "PR #${PR_NUMBER} Preview" \
            --comment "Modules: ${MODULE_LIST}" \
            ${MODULE_FLAGS} \
            test-data/data/modules
        env:
          PR_NUMBER: ${{ steps.pr-info.outputs.pr_number }}
          MODULE_LIST: ${{ steps.detect.outputs.module_list }}
          MODULE_FLAGS: ${{ steps.detect.outputs.module_flags }}

      - name: "Deploy to Netlify"
        if: steps.detect.outputs.has_modules == 'true'
        id: netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: "./multiqc_report"
          production-deploy: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "PR #${{ steps.pr-info.outputs.pr_number }} - modules: ${{ steps.detect.outputs.module_list }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
          alias: multiqc-pr-${{ steps.pr-info.outputs.pr_number }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 2

      - name: "Comment on PR"
        if: steps.detect.outputs.has_modules == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ steps.pr-info.outputs.pr_number }}
          header: multiqc-report-preview
          message: |
            ## MultiQC Report Preview

            A preview report has been built and deployed for the modified module(s): `${{ steps.detect.outputs.module_list }}`

            **[View Report](${{ steps.netlify.outputs.deploy-url }})**

            <sub>Built from ${{ steps.pr-info.outputs.head_sha }}</sub>
